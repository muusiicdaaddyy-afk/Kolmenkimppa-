<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oma profiili - Kolmenkimppa.fi</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#000;
    color:#fff;
}

.container{
    max-width:700px;
    margin:40px auto;
    background:#111;
    border-radius:15px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 20px rgba(212,175,55,.3);
}

.avatar{
    width:180px;
    height:180px;
    border-radius:50%;
    border:4px solid #d4af37;
    object-fit:cover;
    margin-bottom:20px;
}

h1{
    color:#d4af37;
}

.info{
    text-align:left;
    margin-top:30px;
    line-height:2;
}

.button{
    display:inline-block;
    margin-top:30px;
    padding:15px 30px;
    background:#d4af37;
    color:#000;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<img class="avatar" src="https://via.placeholder.com/180" alt="Profiilikuva">

<h1>Käyttäjänimi</h1>

<div class="info">
<p><strong>Ikä:</strong> 30</p>
<p><strong>Sukupuoli:</strong> Mies</p>
<p><strong>Kaupunki:</strong> Turku</p>
<p><strong>Etsin:</strong> Paria</p>
<p><strong>Esittely:</strong> Tähän tulee käyttäjän oma esittely.</p>
</div>

<a class="button" href="#">Muokkaa profiilia</a>

</div>

</body>
</html>
