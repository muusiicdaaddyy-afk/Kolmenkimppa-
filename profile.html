<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Oma profiili - Kolmenkimppa.fi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#000;
    color:#fff;
}

.container{
    max-width:700px;
    margin:40px auto;
    background:#111;
    border-radius:15px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 20px rgba(212,175,55,.3);
}

.avatar{
    width:180px;
    height:180px;
    border-radius:50%;
    border:4px solid #d4af37;
    object-fit:cover;
}

h1{
    color:#d4af37;
}

.info{
    text-align:left;
    margin-top:30px;
    line-height:2;
}

.button{
    display:inline-block;
    margin-top:30px;
    padding:15px 30px;
    background:#d4af37;
    color:#000;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<img class="avatar" src="https://via.placeholder.com/180">

<h1 id="username">Ladataan...</h1>

<div class="info">

<p><strong>Ikä:</strong> <span id="age"></span></p>

<p><strong>Sukupuoli:</strong> <span id="gender"></span></p>

<p><strong>Kaupunki:</strong> <span id="city"></span></p>

</div>

<a class="button" href="#">Muokkaa profiilia</a>

</div>


<script>

const SUPABASE_URL = "https://uakaszazuflqtdztxkxt.supabase.co";

const SUPABASE_KEY = "sb_publishable_E9NRDvVv7X1N1phAgeeYUQ_l7uzu1El";

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);


async function loadProfile(){

const {data:{user}} = await supabaseClient.auth.getUser();


if(!user){
window.location.href="login.html";
return;
}


const {data, error} = await supabaseClient
.from("profiles")
.select("*")
.eq("id", user.id)
.single();


if(error){
alert(error.message);
return;
}


document.getElementById("username").innerHTML = data.username;
document.getElementById("age").innerHTML = data.age;
document.getElementById("gender").innerHTML = data.gender;
document.getElementById("city").innerHTML = data.city;

}


loadProfile();

</script>

</body>
</html>
