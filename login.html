<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kirjaudu - Kolmenkimppa.fi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    background:#000;
    font-family:Arial,sans-serif;
    color:#fff;
}

.container{
    max-width:450px;
    margin:100px auto;
    background:#111;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(212,175,55,.3);
}

h1{
    text-align:center;
    color:#d4af37;
}

input{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    background:#d4af37;
    color:#000;
    border:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
}

a{
    color:#d4af37;
}
</style>

</head>

<body>

<div class="container">

<h1>Kirjaudu</h1>

<form id="loginForm">

<input id="email" type="email" placeholder="Sähköposti" required>

<input id="password" type="password" placeholder="Salasana" required>

<button type="submit">Kirjaudu</button>

</form>

<p style="text-align:center">
Ei vielä tiliä?
<a href="register.html">Rekisteröidy tästä</a>
</p>

</div>


<script>

const SUPABASE_URL = "https://uakaszazuflqtdztxkxt.supabase.co";

const SUPABASE_KEY = "sb_publishable_E9NRDvVv7X1N1phAgeeYUQ_l7uzu1El";

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);


document.getElementById("loginForm")
.addEventListener("submit", async function(e){

e.preventDefault();


const email = document.getElementById("email").value;
const password = document.getElementById("password").value;


const {data, error} = await supabaseClient.auth.signInWithPassword({
email,
password
});


if(error){
alert(error.message);
return;
}


alert("Kirjautuminen onnistui!");

window.location.href="profile.html";


});

</script>

</body>
</html>
