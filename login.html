<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kirjaudu - Kolmenkimppa.fi</title>

<style>
body{
    margin:0;
    background:#000;
    font-family:Arial,sans-serif;
    color:#fff;
}

.container{
    max-width:450px;
    margin:100px auto;
    background:#111;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(212,175,55,.3);
}

h1{
    text-align:center;
    color:#d4af37;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    background:#d4af37;
    color:#000;
    border:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#f5d76e;
}

a{
    color:#d4af37;
    text-decoration:none;
}
</style>

</head>
<body>

<div class="container">

<h1>Kirjaudu</h1>

<form>

<input type="email" placeholder="Sähköposti" required>

<input type="password" placeholder="Salasana" required>

<button type="submit">Kirjaudu</button>

</form>

<p style="text-align:center;margin-top:20px;">
Ei vielä tiliä?
<a href="register.html">Rekisteröidy tästä</a>
</p>

</div>

</body>
</html>
