<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rekisteröidy - Kolmenkimppa.fi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#000;
    color:#fff;
}

.container{
    max-width:450px;
    margin:80px auto;
    background:#111;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(212,175,55,.3);
}

h1{
    text-align:center;
    color:#d4af37;
}

input, select{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    background:#d4af37;
    color:#000;
    border:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

a{
    color:#d4af37;
}
</style>

</head>

<body>

<div class="container">

<h1>Rekisteröidy</h1>

<form id="registerForm">

<input id="username" type="text" placeholder="Käyttäjänimi" required>

<input id="email" type="email" placeholder="Sähköposti" required>

<input id="password" type="password" placeholder="Salasana" required>

<input id="age" type="number" placeholder="Ikä" required>

<select id="gender" required>
<option value="">Olen...</option>
<option>Mies</option>
<option>Nainen</option>
<option>Pari</option>
</select>

<input id="city" type="text" placeholder="Kaupunki">

<button type="submit">Luo tili</button>

</form>

<p style="text-align:center">
Onko sinulla jo tili?
<a href="login.html">Kirjaudu tästä</a>
</p>

</div>

<script>

const SUPABASE_URL = "https://uakaszazuflqtdztxkxt.supabase.co";

const SUPABASE_KEY = "sb_publishable_E9NRDvVv7X1N1phAgeeYUQ_l7uzu1El";

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

document.getElementById("registerForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
    const { data, error } = await supabaseClient.auth.signUp({
    email,
    password
});

if (error) {
    alert(error.message);
    return;
}

if (!data.user) {
    alert("Käyttäjän luonti onnistui, mutta käyttäjätietoja ei saatu.");
    return;
}

const { error: profileError } = await supabaseClient
.from("profiles")
.insert([{
    id: data.user.id,
    username: document.getElementById("username").value,
    age: Number(document.getElementById("age").value),
    gender: document.getElementById("gender").value,
    city: document.getElementById("city").value
}]);

if (profileError) {
    alert(profileError.message);
    return;
}

alert("Tili luotu onnistuneesti!");

window.location.href = "login.html";

});

</script>

</body>
</html>
