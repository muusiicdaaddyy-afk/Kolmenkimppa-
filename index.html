<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kolmenkimppa.fi</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    font-family:Arial,Helvetica,sans-serif;
    background:#000;
    overflow:hidden;
}

.hero{
    width:100%;
    height:100vh;
    background-image:url("34163576-aee5-45f8-9cbc-9319e14e5e00.png");
    background-repeat:no-repeat;
    background-position:center center;
    background-size:85%;
    background-color:#000;
    position:relative;
}

.overlay{
    position:absolute;
    left:0;
    right:0;
    bottom:40px;
    text-align:center;
    padding:20px;
    background:rgba(0,0,0,0.15);
}

h2{
    color:#d4af37;
    font-size:40px;
    margin-bottom:15px;
    text-shadow:0 0 10px #000;
}

p{
    color:#fff;
    font-size:22px;
    margin-bottom:30px;
    text-shadow:0 0 8px #000;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.btn{
    display:inline-block;
    padding:16px 35px;
    border-radius:50px;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
    transition:.3s;
}

.login{
    background:transparent;
    border:2px solid #d4af37;
    color:#fff;
}

.login:hover{
    background:#d4af37;
    color:#000;
}

.register{
    background:#d4af37;
    color:#000;
}

.register:hover{
    background:#f0c84a;
}

.waitlist{
    display:inline-block;
    margin-top:10px;
    color:#d4af37;
    text-decoration:none;
    font-size:18px;
}

.waitlist:hover{
    text-decoration:underline;
}

@media(max-width:768px){

.hero{
    background-size:95%;
}

h2{
    font-size:32px;
}

p{
    font-size:18px;
}

.buttons{
    flex-direction:column;
    align-items:center;
}

.btn{
    width:90%;
    max-width:340px;
    text-align:center;
}

}

</style>

</head>

<body>

<div class="hero">

    <div class="overlay">

        <h2>Tulossa pian</h2>

        <p>Suomen uusi kohtaamispaikka aikuisille.</p>

        <div class="buttons">
            <a href="login.html" class="btn login">Kirjaudu</a>
            <a href="register.html" class="btn register">Rekisteröidy</a>
        </div>

        <a href="#" class="waitlist">Liity odotuslistalle</a>

    </div>

</div>

</body>
</html>
