<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kolmenkimppa.fi – Tulossa pian</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:url("f0372359-7167-43b2-bc6a-2ec7c3cb9d8f.png") center center/cover no-repeat;
}

.overlay{
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.content{
    max-width:600px;
}

h1{
    color:#d4af37;
    font-size:48px;
    margin-bottom:20px;
}

h2{
    color:#ffffff;
    font-size:34px;
    margin-bottom:20px;
}

p{
    color:#ffffff;
    font-size:20px;
    line-height:1.6;
    margin-bottom:40px;
}

.btn{
    display:inline-block;
    padding:18px 40px;
    background:#d4af37;
    color:#000;
    text-decoration:none;
    font-size:22px;
    font-weight:bold;
    border-radius:50px;
    transition:.3s;
}

.btn:hover{
    background:#f2cf5b;
}
</style>

</head>

<body>

<div class="overlay">
    <div class="content">

        <h1>Kolmenkimppa.fi</h1>

        <h2>Tulossa pian</h2>

        <p>
            Suomen uusi kohtaamispaikka aikuisille.<br>
            Rakennamme turvallista ja modernia palvelua.
        </p>

        <a class="btn" href="#">Liity odotuslistalle</a>

    </div>
</div>

</body>
</html>
