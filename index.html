<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kolmenkimppa.fi</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:url("6aac70de-1d00-4ab0-b0df-f6dd1058dd59.png") center center no-repeat;
    background-size:cover;
    height:100vh;
}

.overlay{
    width:100%;
    height:100vh;
    background:rgba(0,0,0,.15);
    display:flex;
    justify-content:center;
    align-items:flex-end;
}

.buttons{
    width:90%;
    max-width:420px;
    margin-bottom:40px;
}

.button{
    display:block;
    text-align:center;
    text-decoration:none;
    padding:18px;
    margin:15px 0;
    border-radius:50px;
    font-size:22px;
    font-weight:bold;
    transition:.3s;
}

.gold{
    background:#d4af37;
    color:#000;
}

.gold:hover{
    background:#f0c95d;
}

.black{
    background:#111;
    color:#fff;
    border:2px solid #d4af37;
}

.black:hover{
    background:#d4af37;
    color:#000;
}

</style>

</head>

<body>

<div class="overlay">

<div class="buttons">

<a class="button gold" href="register.html">
LIITY NYT
</a>

<a class="button black" href="login.html">
KIRJAUDU
</a>

<a class="button black" href="register.html">
REKISTERÖIDY
</a>

</div>

</div>

</body>
</html>
