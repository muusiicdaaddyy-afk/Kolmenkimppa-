<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kolmenkimppa.fi</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    font-family:Arial,Helvetica,sans-serif;
    background:#000;
}

.hero{
    width:100%;
    height:100vh;
    background-image:url("34163576-aee5-45f8-9cbc-9319e14e5e00.png");
    background-repeat:no-repeat;
    background-position:center center;
    background-size:cover;
    position:relative;
}

.overlay{
    position:absolute;
    left:0;
    right:0;
    bottom:40px;
    text-align:center;
    padding:0 20px;
}

h2{
    color:#d4af37;
    font-size:42px;
    margin-bottom:15px;
    text-shadow:0 0 10px #000;
}

p{
    color:#fff;
    font-size:22px;
    margin-bottom:30px;
    text-shadow:0 0 8px #000;
}

.btn{
    display:inline-block;
    padding:18px 45px;
    border-radius:50px;
    background:#d4af37;
    color:#000;
    text-decoration:none;
    font-size:22px;
    font-weight:bold;
}

@media (max-width:768px){

.hero{
    background-position:center top;
    background-size:cover;
}

.overlay{
    bottom:30px;
}

h2{
    font-size:34px;
}

p{
    font-size:18px;
}

.btn{
    width:90%;
    max-width:350px;
    font-size:20px;
    padding:16px 0;
}

}

</style>

</head>

<body>

<div class="hero">

    <div class="overlay">

        <h2>Tulossa pian</h2>

        <p>Suomen uusi kohtaamispaikka aikuisille.</p>

        <a href="#" class="btn">Liity odotuslistalle</a>

    </div>

</div>

</body>
</html>
