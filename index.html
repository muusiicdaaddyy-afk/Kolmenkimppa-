<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kolmenkimppa.fi</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#000;
}

.hero{
    position:relative;
    width:100%;
    height:100vh;
}

.hero img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.15);
    display:flex;
    justify-content:flex-end;
    align-items:center;
    flex-direction:column;
    padding-bottom:35px;
}

.buttons{
    width:90%;
    max-width:420px;
}

.btn{
    display:block;
    text-decoration:none;
    text-align:center;
    padding:18px;
    margin:15px 0;
    border-radius:50px;
    font-size:22px;
    font-weight:bold;
    transition:.3s;
}

.gold{
    background:#d4af37;
    color:#000;
}

.dark{
    background:#111;
    color:#fff;
    border:2px solid #d4af37;
}

.gold:hover{
    background:#f2cf63;
}

.dark:hover{
    background:#d4af37;
    color:#000;
}

</style>

</head>

<body>

<div class="hero">

<img src="6aac70de-1d00-4ab0-b0df-f6dd1058dd59.png" alt="Kolmenkimppa">

<div class="overlay">

<div class="buttons">

<a class="btn gold" href="register.html">
LIITY NYT
</a>

<a class="btn dark" href="login.html">
KIRJAUDU
</a>

<a class="btn dark" href="register.html">
REKISTERÖIDY
</a>

</div>

</div>

</div>

</body>
</html>
