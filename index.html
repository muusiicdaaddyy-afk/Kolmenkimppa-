<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kolmenkimppa.fi</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    font-family:Arial,Helvetica,sans-serif;
    background:#000;
    overflow:hidden;
}

.hero{
    width:100%;
    height:100vh;

    /* Nihutab pilti veidi üles */
    background:url("34163576-aee5-45f8-9cbc-9319e14e5e00.png") center top/cover no-repeat;

    position:relative;
}

.overlay{
    position:absolute;
    inset:0;

    background:rgba(0,0,0,.15);

    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    align-items:center;

    padding-bottom:8vh;
}

h2{
    color:#d4af37;
    font-size:clamp(34px,7vw,48px);
    margin-bottom:15px;
    text-shadow:0 0 12px #000;
}

p{
    color:#fff;
    font-size:clamp(20px,4vw,28px);
    text-align:center;
    margin-bottom:30px;
    text-shadow:0 0 10px #000;
    padding:0 20px;
}

.btn{
    display:inline-block;
    padding:18px 48px;
    border-radius:50px;
    background:#d4af37;
    color:#000;
    text-decoration:none;
    font-size:22px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    background:#f3cc54;
}

@media (max-width:768px){

.hero{
    background-position:center 15%;
}

.overlay{
    padding-bottom:6vh;
}

h2{
    font-size:54px;
}

p{
    font-size:22px;
}

.btn{
    width:88%;
    max-width:420px;
    text-align:center;
    font-size:24px;
}

}

</style>

</head>

<body>

<div class="hero">

    <div class="overlay">

        <h2>Tulossa pian</h2>

        <p>Suomen uusi kohtaamispaikka aikuisille.</p>

        <a href="#" class="btn">Liity odotuslistalle</a>

    </div>

</div>

</body>
</html>
