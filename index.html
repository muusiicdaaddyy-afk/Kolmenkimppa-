<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kolmenkimppa.fi</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    font-family:Arial,Helvetica,sans-serif;
    overflow:hidden;
    background:#000;
}

.hero{
    width:100%;
    height:100vh;
    background:url("34163576-aee5-45f8-9cbc-9319e14e5e00.png") center center/cover no-repeat;
    position:relative;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.25);
    display:flex;
    justify-content:flex-end;
    align-items:center;
    flex-direction:column;
    padding-bottom:60px;
}

h2{
    color:#d4af37;
    font-size:42px;
    margin-bottom:15px;
    text-shadow:0 0 10px #000;
}

p{
    color:#fff;
    font-size:22px;
    text-align:center;
    margin-bottom:35px;
    text-shadow:0 0 8px #000;
}

.btn{
    display:inline-block;
    padding:18px 45px;
    border-radius:50px;
    background:#d4af37;
    color:#000;
    text-decoration:none;
    font-size:22px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    background:#f3cc54;
}

</style>

</head>

<body>

<div class="hero">

<div class="overlay">

<h2>Tulossa pian</h2>

<p>
Suomen uusi kohtaamispaikka aikuisille.
</p>

<a href="#" class="btn">Liity odotuslistalle</a>

</div>

</div>

</body>
</html>
