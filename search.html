<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hae profiileja - Kolmenkimppa.fi</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
}

header{
    background:#111;
    padding:20px;
    text-align:center;
    color:#d4af37;
    font-size:30px;
    font-weight:bold;
}

.container{
    max-width:1200px;
    margin:30px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#111;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 15px rgba(212,175,55,.2);
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.info{
    padding:15px;
}

.info h2{
    color:#d4af37;
    margin:0;
}

.button{
    display:block;
    margin:15px;
    padding:12px;
    text-align:center;
    background:#d4af37;
    color:#000;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>Kolmenkimppa.fi</header>

<div class="container">

<div class="card">
<img src="https://via.placeholder.com/400x300" alt="">
<div class="info">
<h2>Anna, 29</h2>
<p>Turku</p>
</div>
<a class="button" href="profile.html">Katso profiili</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/400x300" alt="">
<div class="info">
<h2>Mikko & Laura</h2>
<p>Helsinki</p>
</div>
<a class="button" href="profile.html">Katso profiili</a>
</div>

</div>

</body>
</html>
